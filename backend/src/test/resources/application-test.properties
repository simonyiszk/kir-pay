spring.application.name=Kir-Pay-Test
spring.datasource.url=jdbc:tc:postgresql:17-alpine:///kirpay-test?TC_REUSABLE=true&TC_INITSCRIPT=file:src/main/resources/schema-postgresql.sql
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=kirpay
spring.datasource.password=password
spring.sql.init.mode=never
spring.modulith.events.republish-outstanding-events-on-restart=false
spring.modulith.events.jdbc.schema-initialization.enabled=true
hu.bme.sch.kirpay.principals[0].name=test-admin
hu.bme.sch.kirpay.principals[0].password=test-admin-pw
hu.bme.sch.kirpay.principals[0].role=ADMIN
hu.bme.sch.kirpay.principals[0].can-redeem-vouchers=true
hu.bme.sch.kirpay.principals[0].can-sell-items=true
hu.bme.sch.kirpay.principals[0].can-transfer=true
hu.bme.sch.kirpay.principals[0].can-upload=true
hu.bme.sch.kirpay.principals[0].can-assign-cards=true
hu.bme.sch.kirpay.principals[0].active=true
hu.bme.sch.kirpay.backend.frontend-url=http://localhost:3000

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.global.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.global.postgresql.auth.password | quote }}
  ADMINISTRATOR_USERNAME: {{ .Values.app.administrator.username | quote }}
  ADMINISTRATOR_PASSWORD: {{ .Values.app.administrator.password | quote }}

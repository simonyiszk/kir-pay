{{ if and .Values.postgresql.enabled .Values.postgresBackup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-postgres-backup
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  schedule: {{ .Values.postgresBackup.schedule }}
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: postgres-backup
              image: {{ .Values.postgresBackup.image }}
              env:
                - name: DRIVE_FILE_NAME
                  value: {{ .Release.Name }}
                - name: DBNAME
                  value: {{ .Values.postgresql.global.postgresql.auth.database }}
                - name: PGHOST
                  value: "{{ .Release.Name }}-postgresql"
                - name: PGPORT
                  value: "5432"
              envFrom:
                - secretRef:
                    optional: false
                    name: "{{ .Release.Name }}-postgres-backup-secrets"
              imagePullPolicy: {{ .Values.postgresBackup.imagePullPolicy }}
          restartPolicy: {{ .Values.postgresBackup.restartPolicy }}
{{ end }}

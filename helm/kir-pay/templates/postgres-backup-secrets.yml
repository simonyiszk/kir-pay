{{ if and .Values.postgresql.enabled .Values.postgresBackup.enabled }}
kind: Secret
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-postgres-backup-secrets
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
data:
  GOOGLE_SERVICE_ACCOUNT_KEY: {{ .Values.postgresBackup.googleServiceAccount | b64enc }}
  DRIVE_PARENT_ID: {{ .Values.postgresBackup.driveParentId | b64enc }}
  DRIVE_ID: {{ .Values.postgresBackup.driveId | b64enc }}
  PGPASSWORD: {{ .Values.postgresql.global.postgresql.auth.password | b64enc }}
  PGUSER: {{ .Values.postgresql.global.postgresql.auth.username | b64enc }}
type: Opaque
{{ end }}

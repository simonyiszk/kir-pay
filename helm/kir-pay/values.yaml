frontend:
  enabled: true
  image: ghcr.io/simonyiszk/kir-pay-frontend:latest
  host: kir.pay
  strategyType: RollingUpdate
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu:
      memory:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/tls-acme: 'true'
      nginx.ingress.kubernetes.io/proxy-body-size: 20m
  service:
    type: ClusterIP
  imagePullPolicy: Always
  startupProbe:
    failureThreshold: 60
    periodSeconds: 5
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 10
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5

app:
  image: ghcr.io/simonyiszk/kir-pay
  administrator:
    username: admin
    password: admin
  host: api.kir.pay
  replicas: 1
  strategyType: RollingUpdate
  frontendUrl: https://kir.pay
  currencySymbol: JMF
  imagePullPolicy: Always
  ingress:
    enabled: true
    blockActuatorEndpoints: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/tls-acme: 'true'
      nginx.ingress.kubernetes.io/proxy-body-size: 20m
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu:
      memory:
  startupProbe:
    failureThreshold: 60
    periodSeconds: 5
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 10
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 5

monitoring:
  enabled: true

postgresBackup:
  enabled: true
  schedule: "0 3 * * *"
  restartPolicy: Never
  imagePullPolicy: Always
  image: harbor.sch.bme.hu/org-kir-dev/postgres-backup:latest
  googleServiceAccount: 'service account json contents'
  driveParentId: 'the ID of the drive folder for the files'
  driveId: 'the ID of the shared drive'

postgresql:
  enabled: true
  global:
    security:
      allowInsecureImages: true # TODO fix https://github.com/bitnami/containers/issues/83267
    defaultStorageClass: memory-ssd
    postgresql:
      auth:
        database: kir-pay
        username: kirpay
        password: password
  architecture: standalone
  image:
    repository: bitnamilegacy/postgresql
  metrics:
    enabled: true
    image:
      repository: bitnamilegacy/postgres-exporter
    serviceMonitor:
      relabelings:
        - sourceLabels: [ __meta_kubernetes_pod_name ]
          targetLabel: instance
          action: replace
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 50Mi
      limits:
        cpu: 150m
        memory: 192Mi
        ephemeral-storage: 50Mi
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  primary:
    networkPolicy:
      allowExternal: false
    persistence:
      size: 2Gi
    resourcesPreset: "small"
